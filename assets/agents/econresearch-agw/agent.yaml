# Catalog entry for the econresearch-agw agent (AWS Bedrock AgentCore lab,
# Part 4). Extends econresearch: LLM calls (OpenAI gpt-5.4-nano) and live
# FRED MCP tool calls are BOTH routed through the workshop's Agentgateway.
#
# agentregistry clones the agent source from `source.repository.url` at the
# given `subfolder` and builds the AgentCore image from its Dockerfile.
# Until this workshop repo is published, the URL points at the public copy
# so the lab works today. Once `solo-io/fe-enterprise-agentregistry-workshop`
# is public, repoint to:
#   url: "https://github.com/solo-io/fe-enterprise-agentregistry-workshop"
apiVersion: ar.dev/v1alpha1
kind: Agent
metadata:
  name: econresearch-agw
  tag: "1.0.0"
spec:
  description: "Economic research assistant with live FRED data - LLM calls (OpenAI gpt-5.4-nano) and FRED MCP tool calls both routed through Agentgateway"
  modelName: gpt-5.4-nano
  modelProvider: openai
  # fred-gateway-mcp is an agent-facing catalog entry whose remote URL is the
  # public gateway route (http://<your-gateway>/registry/fred); the lab creates
  # it inline since the address is per-user. Remote MCPServers are injected
  # into MCP_SERVERS_CONFIG by catalog URL with no deploymentRefs needed (the
  # registry currently rejects deploymentRefs that resolve to remote MCPs).
  mcpServers:
    - kind: MCPServer
      name: fred-gateway-mcp
  source:
    image: localhost:5001/econresearch-agw:latest
    repository:
      url: "https://github.com/ably77/solo-enterprise-agentregistry-workshop"
      branch: "main"
      subfolder: "assets/agents/econresearch-agw"
