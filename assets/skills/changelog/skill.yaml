apiVersion: ar.dev/v1alpha1
kind: Skill
metadata:
  name: changelog
  tag: "1.0.0"
spec:
  title: Changelog
  description: Updates CHANGELOG.md with a concise entry for the current conversation's changes, matching the repo's version and date format; always shown for confirmation before writing.
  # The skill's content (SKILL.md + supporting files) lives in a source repo; the
  # catalog stores a reference to it. Consumers fetch it with `arctl pull skill changelog`.
  source:
    repository:
      url: "https://github.com/ably77/solo-enterprise-agentregistry-workshop"
      subfolder: "assets/skills/changelog"
