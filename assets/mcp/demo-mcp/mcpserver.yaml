# Catalog entry for the in-tree stdio demo MCP server (demo-tools).
#
# agentregistry clones the server source from `source.repository.url` at the
# given `subfolder`. Until this workshop repo is published, the URL points at
# the proven copy in `solo-io/field-agentic-labs` so the lab works today.
# Once `solo-io/fe-enterprise-agentregistry-workshop` is public, repoint to:
#   url: "https://github.com/solo-io/fe-enterprise-agentregistry-workshop"
#   subfolder: "assets/mcp/demo-mcp"
apiVersion: ar.dev/v1alpha1
kind: MCPServer
metadata:
  name: demo-tools
  tag: "1.0.0"
spec:
  description: "A minimal MCP server with simple tools: get_time, random_number, reverse_string"
  transport: stdio
  command: "python3 server.py"
  source:
    repository:
      url: "https://github.com/solo-io/field-agentic-labs"
      subfolder: "agentregistry-enterprise/assets/mcp/demo-mcp"
  tools:
    - name: get_time
      description: "Get the current UTC time"
    - name: random_number
      description: "Generate a random number between min and max"
    - name: reverse_string
      description: "Reverse a string"
