# Deploy the in-cluster FRED MCP to the Virtual runtime; exposed at
# /registry/fred under the parent route's /registry prefix.
apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: fred-incluster-agw
spec:
  targetRef:
    kind: MCPServer
    name: fred-incluster-mcp
    tag: latest
  runtimeRef:
    kind: Runtime
    name: virtual-default
  runtimeConfig:
    route:
      pathSuffix: /fred
