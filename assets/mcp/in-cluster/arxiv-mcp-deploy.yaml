# Deploy the in-cluster arXiv MCP to the Virtual runtime so agentregistry
# generates the child HTTPRoute + EnterpriseAgentgatewayBackend that expose it
# through the parent Gateway at /registry/arxiv.
apiVersion: ar.dev/v1alpha1
kind: Deployment
metadata:
  name: arxiv-incluster-agw
spec:
  targetRef:
    kind: MCPServer
    name: arxiv-incluster-mcp
    tag: latest
  runtimeRef:
    kind: Runtime
    name: virtual-default
  runtimeConfig:
    route:
      pathSuffix: /arxiv
